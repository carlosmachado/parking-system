server.port=3003

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/parking_db?useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=none
# Dialect is auto-detected from the connection (MySQL in production, H2 in tests)

# Pool sized for many concurrent virtual threads briefly waiting on a connection
spring.datasource.hikari.maximum-pool-size=20

# Java 21 virtual threads: Tomcat request handling + @Async/@TransactionalEventListener
spring.threads.virtual.enabled=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=jdbc:mysql://localhost:3306/parking_db
spring.flyway.user=root
spring.flyway.password=root

# Simulator
simulator.url=http://localhost:3000

# Garage initialization retry (simulator may not be ready when the app boots)
garage.init.max-attempts=10
garage.init.retry-delay-ms=3000

# Webhook
webhook.host=localhost

# Timezone
timezone=America/Sao_Paulo
