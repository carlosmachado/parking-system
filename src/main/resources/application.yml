server:
  port: 3003

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/parking_db?useSSL=false&serverTimezone=America/Sao_Paulo
    username: root
    password: root
    # Pool sized for many concurrent virtual threads briefly waiting on a connection
    hikari:
      maximum-pool-size: 20
  jpa:
    # Dialect is auto-detected from the connection (MySQL in production, H2 in tests)
    hibernate:
      ddl-auto: none
  # Java 21 virtual threads: Tomcat request handling + @Async/@TransactionalEventListener
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:mysql://localhost:3306/parking_db
    user: root
    password: root

simulator:
  url: http://localhost:3000
  connect-timeout-ms: 2000
  read-timeout-ms: 5000

# Garage initialization retry (simulator may not be ready when the app boots)
garage:
  init:
    max-attempts: 10
    retry-delay-ms: 3000

webhook:
  host: localhost

# Pricing strategy election: AT_EXIT (choose from occupancy at exit) or AT_ENTRY (lock in at entry)
pricing:
  election: AT_EXIT

# Revenue async update retry
revenue:
  update:
    max-attempts: 3
    retry-delay-ms: 100

timezone: America/Sao_Paulo
